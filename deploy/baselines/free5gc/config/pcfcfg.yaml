info:
  version: 1.0.2
  description: PCF initial local configuration

configuration:
  sbi:
    scheme: http
    registerIPv4: pcf
    bindingIPv4: 0.0.0.0
    port: 8000
  serviceNameList:
    - npcf-am-policy-control
    - npcf-smpolicycontrol
    - npcf-bdtpolicycontrol
    - npcf-policyauthorization
    - npcf-eventexposure
    - npcf-ue-policy-control
  nrfUri: http://nrf:8000
  mongodb:
    name: free5gc
    url: mongodb://db:27017
  plmnList:
    - mcc: "001"
      mnc: "01"
  locality: area1

logger:
  level: info
