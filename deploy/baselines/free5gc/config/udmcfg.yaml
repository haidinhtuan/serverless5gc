info:
  version: 1.0.3
  description: UDM initial local configuration

configuration:
  sbi:
    scheme: http
    registerIPv4: udm
    bindingIPv4: 0.0.0.0
    port: 8000
  serviceNameList:
    - nudm-sdm
    - nudm-uecm
    - nudm-ueau
    - nudm-ee
    - nudm-pp
  nrfUri: http://nrf:8000
  plmnList:
    - mcc: "001"
      mnc: "01"

logger:
  enable: true
  level: info
