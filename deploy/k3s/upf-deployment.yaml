apiVersion: v1
kind: ConfigMap
metadata:
  name: upf-config
  namespace: default
data:
  upfcfg.yaml: |
    version: 1.0.3
    description: UPF configuration

    pfcp:
      addr: 0.0.0.0
      nodeID: upf

    gtpu:
      forwarder: gtp5g
      ifList:
        - addr: 0.0.0.0
          type: N3

    dnnList:
      - dnn: internet
        cidr: 10.60.0.0/16

    logger:
      level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  namespace: default
  labels:
    app: upf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
  template:
    metadata:
      labels:
        app: upf
    spec:
      containers:
        - name: upf
          image: free5gc/upf:v3.4.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - containerPort: 8805
              protocol: UDP
              name: pfcp
            - containerPort: 2152
              protocol: UDP
              name: gtpu
          volumeMounts:
            - name: upf-config
              mountPath: /free5gc/config/upfcfg.yaml
              subPath: upfcfg.yaml
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: upf-config
          configMap:
            name: upf-config
---
apiVersion: v1
kind: Service
metadata:
  name: upf
  namespace: default
  labels:
    app: upf
spec:
  selector:
    app: upf
  ports:
    - name: pfcp
      port: 8805
      targetPort: 8805
      protocol: UDP
    - name: gtpu
      port: 2152
      targetPort: 2152
      protocol: UDP
