version: "3.8"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  etcd:
    image: bitnami/etcd:3.5
    ports:
      - "2379:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"

  testgateway:
    build:
      context: .
      dockerfile: cmd/testgateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      ETCD_ENDPOINT: etcd:2379
    depends_on:
      - redis
      - etcd
